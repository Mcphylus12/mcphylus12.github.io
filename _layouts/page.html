<style>
        body 
        {    
            margin: 0;
            pointer-events: none;
            color: darkslategrey;
            background-color: whitesmoke;
            font-family: monospace;
        }
        
        #image-container {
            color: whitesmoke;
            width: 50%;
            position: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-image: url(/assets/BG.PNG);
            bottom: 0;
            top: 0;
        }
        
        #title
        {
            position: relative;
            top: 40px;
            left: 40px;
            font-size: 34px;
        }
        
        #title-two
        {
            position: relative;
            left: 40px;
        }
        
        #profile {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #avatar-container {    
            border: 2px solid smokewhite;
            border-radius: 50%;
            overflow: hidden;
        }
        
        #name {
            text-align: center;
            margin: 10px;
        }
        
        #links
        {
            text-align: center;
            pointer-events: all;
        }
        
        .link
        {
            display: inline-block;
            width: 20px;
            height: 20px;
            text-decoration: none;
            list-style: none;
        }
        
        .link a
        {
            width: 100%;
            height: 100%;
        }
        
        .link a img
        {
            width: 100%;
            height: 100%;
        }

        #content
        {
            top: 0;
            bottom: 0;
            width: 50%;
            left: 50%;
            position: absolute;
        }
        
    a {
        pointer-events: all;
    }
        
        </style>
        <div id="page">
          <div id="image-container">
          <div>
            <div id="title">
              <div id="title-one">A Pleb's</div>
              <div id="title-two">Ponderings</div>
            </div>
            <div id="profile">
                <div id="avatar-container"><img id="avatar" src="https://avatars2.githubusercontent.com/u/3704565?s=400&v=4"/></div>
                <div id="name">Kyle James Alexander</div>
                <div id="links">
                    <div class="link"><a href="https://github.com/Mcphylus12"><img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"/></a></div>
                    <div class="link"><a href="https://www.linkedin.com/in/kyle-alexander-352b07127"><img src="https://content.linkedin.com/content/dam/me/business/en-us/amp/brand-site/v2/bg/LI-Bug.svg.original.svg"/></a></div>
                </div>
            </div>
          </div>
          </div>
        <div id="content">
         {{ content }}
        </div>
        </div>
